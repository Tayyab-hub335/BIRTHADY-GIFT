<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Meri Pyari Si Jaan ❤️</h1>
  <h2>Meri taraf se Happy Birthday 🎂🎉</h2>

  <!-- Question Box -->
  <div id="questionBox">
    <p>Aap mujhe kitna pyar karti ho? 💖</p>
    <p><em>Hint: Zayda, Boht Zayda, Sabsa Zayda ❤️</em></p>
    <div class="options">
      <button onclick="showGift()">Zayda</button>
      <button onclick="showGift()">Boht Zayda</button>
      <button onclick="showGift()">Sabsa Zayda</button>
    </div>
  </div>

  <!-- Gift Box -->
  <div id="gift" style="display:none;">
    <h1>Surprise! 🎁</h1>
    <p>Hum saath hue <span id="years"></span> saal ❤️</p>

    <!-- Romantic Message -->
    <p>Apko gift me kya chahiye? ❤️</p>
    <p>Meray saath hamesha rehna, aur mera saat nikkha karna ✨💖</p>

    <!-- Images Gallery -->
    <div class="gallery">
      <img src="images/F1.jpg" width="200">
      <img src="images/F2.jpg" width="200">
      <img src="images/F3.jpg" width="200">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
